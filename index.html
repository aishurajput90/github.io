<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky Dasher</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0a0a1a;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        margin: 0;
        text-align: center;
        padding: 20px;
      }
      h1 {
        font-size: 3rem;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 1.1rem;
        color: #aaaacc;
        max-width: 400px;
        line-height: 1.6;
      }
      .badge {
        margin-top: 2rem;
      }
      .badge a {
        background: #01875f;
        color: white;
        text-decoration: none;
        padding: 14px 28px;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
      }
      .contact {
        margin-top: 2.5rem;
        font-size: 0.85rem;
        color: #666688;
      }
      .contact a {
        color: #8888cc;
      }
    </style>
  </head>
  <body>
    <h1>🐦 Sky Dasher</h1>
    <p>A fast-paced arcade game. Tap to fly, dodge the pipes, and beat your high score.</p>
    <div class="badge">
      <a href="https://play.google.com/store/apps/details?id=com.yourname.skydashergame">
        Get it on Google Play
      </a>
    </div>
    <div class="contact">
      Contact: <a href="mailto:aakidscompany@gmail.com">aakidscompany@gmail.com</a>
    </div>
  </body>
  </html>
